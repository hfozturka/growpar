name: Build and Upload to App Store

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode 26
      run: |
        ls /Applications/ | grep Xcode
        sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version
    
    - name: Install Certificate
      env:
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        P12_BASE64: ${{ secrets.P12_BASE64 }}
      run: |
        echo "$P12_BASE64" | base64 --decode > certificate.p12
        security create-keychain -p "build123" build.keychain
        security set-keychain-settings -lut 21600 build.keychain
        security unlock-keychain -p "build123" build.keychain
        security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
        security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build123" build.keychain

    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/23af3a42-979c-4433-b9f5-9ad2958e7f47.mobileprovision

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project GrowPAR.xcodeproj \
          -scheme GrowPAR \
          -configuration Release \
          -archivePath "$RUNNER_TEMP/GrowPAR.xcarchive" \
          CODE_SIGN_STYLE=Manual \
          "CODE_SIGN_IDENTITY=Apple Distribution: Halil Fatih Öztürk (UKMP287GQD)" \
          PROVISIONING_PROFILE="23af3a42-979c-4433-b9f5-9ad2958e7f47" \
          DEVELOPMENT_TEAM=UKMP287GQD

    - name: Export IPA
      run: |
        cat > "$RUNNER_TEMP/ExportOptions.plist" << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>UKMP287GQD</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>signingCertificate</key>
          <string>Apple Distribution</string>
          <key>provisioningProfiles</key>
          <dict>
            <key>com.hfozturka.growparios</key>
            <string>23af3a42-979c-4433-b9f5-9ad2958e7f47</string>
          </dict>
        </dict>
        </plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath "$RUNNER_TEMP/GrowPAR.xcarchive" \
          -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
          -exportPath "$RUNNER_TEMP/export"

    - name: Upload to App Store Connect
      env:
        API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
        xcrun altool --upload-app \
          -f "$RUNNER_TEMP/export/GrowPAR.ipa" \
          -t ios \
          --apiKey "$API_KEY_ID" \
          --apiIssuer "$API_ISSUER_ID"
