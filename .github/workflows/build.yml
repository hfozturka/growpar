name: Build and Upload to App Store

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Certificate
      env:
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        P12_BASE64: ${{ secrets.P12_BASE64 }}
      run: |
        echo $P12_BASE64 | base64 --decode > certificate.p12
        security create-keychain -p "build" build.keychain
        security import certificate.p12 -k build.keychain -P $P12_PASSWORD -T /usr/bin/codesign
        security list-keychains -s build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "build" build.keychain
        security set-key-partition-list -S apple-tool:,apple: -s -k "build" build.keychain

    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > profile.mobileprovision
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        uuid=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${uuid}.mobileprovision

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project GrowPAR.xcodeproj \
          -scheme GrowPAR \
          -configuration Release \
          -archivePath GrowPAR.xcarchive \
          -allowProvisioningUpdates \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=UKMP287GQD

    - name: Export IPA
      run: |
        cat > ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>UKMP287GQD</string>
          <key>signingStyle</key>
          <string>automatic</string>
        </dict>
        </plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath GrowPAR.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath ./export \
          -allowProvisioningUpdates

    - name: Upload to App Store Connect
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      run: |
        xcrun altool --upload-app \
          -f ./export/GrowPAR.ipa \
          -t ios \
          --username $APPLE_ID \
          --password $APPLE_APP_PASSWORD
