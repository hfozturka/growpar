name: Build and Upload to App Store

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app
      
    - name: Show Xcode version
      run: xcodebuild -version
    
    - name: Install Certificate
      env:
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        P12_BASE64: ${{ secrets.P12_BASE64 }}
      run: |
        echo $P12_BASE64 | base64 --decode > certificate.p12
        security create-keychain -p "" build.keychain
        security import certificate.p12 -k build.keychain -P $P12_PASSWORD -T /usr/bin/codesign
        security list-keychains -s build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
    
    - name: Install Provisioning Profile
      env:
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        echo $PROVISIONING_PROFILE_BASE64 | base64 --decode > profile.mobileprovision
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
    
    - name: Build Archive
      run: |
        xcodebuild archive \
          -project GrowPAR.xcodeproj \
          -scheme GrowPAR \
          -configuration Release \
          -archivePath GrowPAR.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="GrowPAR AppStore"
    
    - name: Export IPA
      run: |
        cat > ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>UKMP287GQD</string>
        </dict>
        </plist>
        PLIST
        xcodebuild -exportArchive \
          -archivePath GrowPAR.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath ./export
    
    - name: Upload to App Store Connect
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      run: |
        echo $APP_STORE_CONNECT_API_KEY_BASE64 | base64 --decode > AuthKey.p8
        xcrun altool --upload-app \
          -f ./export/GrowPAR.ipa \
          --apiKey $APP_STORE_CONNECT_API_KEY_ID \
          --apiIssuer $APP_STORE_CONNECT_API_ISSUER_ID \
          --private-key AuthKey.p8
